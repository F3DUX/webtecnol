<style>
.wrapper .icon {
  position: relative;
  background-color: #ffffff; 
  border-radius: 50%;
  margin: 10px;
  width: 50px;                                                     <!--TODO ESTO ES PARA QUE APAREZCA UN BOTON CHICO DE IG PARA IR A MI INSTAGRAM-->
  height: 50px;
  line-height: 50px;
  font-size: 22px;
  display: inline-block;
  text-align: center; /* Para centrar el icono */
  box-shadow: 0 10px 10px rgba(0, 0, 0, 0.1);
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  color: #333;
  text-decoration: none;
}

.wrapper .tooltip {
  position: absolute;
  top: 0;100%); /* Centra el tooltip sobre el icono */
  line-height: 1.5;
  font-size: 14px;
  background-color: #ffffff;
  color: #ffffff;
  padding: 5px 8px;
  border-radius: 5px;
  box-shadow: 0 10px 10px rgba(0, 0, 0, 0.1);
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

/* Efecto Hover */
.wrapper .icon:hover .tooltip {
  top: -45px;
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
}

.wrapper .instagram:hover,
.wrapper .instagram:hover .tooltip {
  background-color: #e1306c;
  color: #ffffff;
}
